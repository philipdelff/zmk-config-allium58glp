name: Draw ZMK Layout
on:
  push:
    paths:
      - 'config/*.keymap'
      - 'config/*.json'

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Parse and Draw
        run: |
          keymap parse -z config/lily58.keymap > layout.yaml
          keymap draw layout.yaml > layout.svg

      - name: Commit and Push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add layout.svg layout.yaml
          git commit -m "Update layout visualization" || exit 0
          git push
